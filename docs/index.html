<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Leave empty for same-origin API (e.g. Netlify proxies in netlify.toml). For direct cross-origin calls, set your backend origin, e.g. https://example.onrender.com -->
  <meta name="phrasesql-api" content="">
  <title>PhraseSQL — Ask in plain language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f4f1;
      --bg-elevated: #ffffff;
      --text: #1a1d21;
      --text-muted: #5c636e;
      --border: #e2ddd4;
      --accent: #0d4f4c;
      --accent-hover: #0a3f3c;
      --accent-soft: #e8f2f1;
      --danger: #b42318;
      --danger-bg: #fef3f2;
      --success: #0d4f4c;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 2px rgba(26, 29, 33, 0.06), 0 4px 16px rgba(26, 29, 33, 0.06);
    }
    * { box-sizing: border-box; }
    html {
      overflow-x: hidden;
    }
    body {
      font-family: "Instrument Sans", system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }
    .page {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem max(1rem, env(safe-area-inset-left)) 4rem max(1rem, env(safe-area-inset-right));
    }
    header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }
    h1 {
      font-size: clamp(1.65rem, 4vw, 2rem);
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .tagline {
      margin: 0;
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 36em;
    }
    .panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.35rem 1.5rem;
      margin-bottom: 1.25rem;
      max-width: 100%;
      min-width: 0;
    }
    .status-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-muted);
    }
    .status-line strong { color: var(--text); font-weight: 600; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .status-line.ok .dot { background: #1b7f3a; }
    .status-line.fail .dot { background: var(--danger); }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    textarea {
      width: 100%;
      min-height: 112px;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    textarea::placeholder { color: #9a9ea6; }
    select {
      width: 100%;
      max-width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 1rem;
    }
    button {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    button.primary {
      background: var(--accent);
      color: #fff;
    }
    button.primary:hover { background: var(--accent-hover); }
    button.primary:disabled {
      background: #c5cbc9;
      cursor: not-allowed;
      transform: none;
    }
    button.ghost {
      background: var(--bg-elevated);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost:hover { background: var(--bg); }
    button.ghost:disabled { opacity: 0.45; cursor: not-allowed; }
    .result {
      margin-top: 1.25rem;
      padding: 1rem 1.1rem;
      border-radius: var(--radius-sm);
      background: #faf9f7;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      max-width: 100%;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.85rem;
      line-height: 1.55;
      -webkit-overflow-scrolling: touch;
    }
    .result.success { border-color: #8faaa8; background: var(--accent-soft); }
    .result.error {
      border-color: #f3cbc8;
      background: var(--danger-bg);
      color: var(--danger);
    }
    .meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0.65rem 0 0;
    }
    .meta strong { color: var(--text); font-weight: 600; }
    .schema-section { margin-bottom: 0; }
    .schema-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }
    .schema-toggle:hover { color: var(--accent); }
    .schema-toggle .chevron {
      display: inline-flex;
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .schema-section.open .schema-toggle .chevron { transform: rotate(90deg); }
    .schema-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0.5rem 0 0.75rem;
    }
    .schema-tips {
      margin: 0 0 1rem;
      padding-left: 1.15rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .schema-tips li { margin-bottom: 0.4rem; }
    .schema-tips li:last-child { margin-bottom: 0; }
    .schema-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(170px, 100%), 1fr));
      gap: 0.75rem;
    }
    .schema-card {
      background: #faf9f7;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 0;
    }
    .schema-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(13, 79, 76, 0.08);
    }
    .schema-card.open { border-color: var(--accent); }
    .schema-card-name {
      font-weight: 600;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.9rem;
    }
    .schema-card-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      line-height: 1.35;
      word-wrap: break-word;
    }
    .schema-cols {
      display: none;
      margin-top: 0.65rem;
      padding-top: 0.65rem;
      border-top: 1px solid var(--border);
    }
    .schema-card.open .schema-cols { display: block; }
    .schema-cols-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .col-pill {
      display: inline-block;
      font-size: 0.68rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      margin: 0.15rem 0.15rem 0 0;
      cursor: pointer;
    }
    .col-pill:hover { border-color: var(--accent); color: var(--accent); }
    .col-pill.copied { background: var(--accent); border-color: var(--accent); color: #fff; }
    .execute-hint {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 0.65rem;
    }
    .table-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      -webkit-overflow-scrolling: touch;
    }
    .table-wrap table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      margin: 0;
      font-size: 0.78rem;
    }
    .table-wrap th,
    .table-wrap td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.55rem;
      text-align: left;
      vertical-align: top;
      max-width: 14rem;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }
    .table-wrap th {
      background: var(--bg);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    #result, #executeResult {
      max-width: 100%;
      min-width: 0;
    }
    .results-summary {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0.75rem 0 0.35rem;
    }
    .results-summary strong { color: var(--text); font-weight: 600; }
    footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <p class="brand">PhraseSQL</p>
      <h1>Ask in plain language</h1>
      <p class="tagline">Turn everyday questions into database queries. Review the result, then run it when you are ready.</p>
    </header>

    <div class="panel status-line" id="serverStatusRow">
      <span class="dot"></span>
      <span id="serverStatus">Checking connection…</span>
    </div>

    <div class="panel schema-section" id="schemaSection">
      <button type="button" class="schema-toggle" id="schemaToggle" aria-expanded="false">
        <span class="chevron" aria-hidden="true">›</span>
        <span id="schemaToggleLabel">Loading reference data…</span>
      </button>
      <p class="schema-desc" id="schemaDesc"></p>
      <ul class="schema-tips" id="schemaTips" hidden></ul>
      <div class="schema-grid" id="schemaGrid"></div>
    </div>

    <div class="panel">
      <label for="question">What would you like to know?</label>
      <textarea id="question" placeholder="For example: show the ten largest orders by total amount"></textarea>

      <label for="mode" style="margin-top:1rem">How should we draft your query?</label>
      <select id="mode">
        <option value="hybrid">Balanced — reuse past examples when helpful</option>
        <option value="llm">Full interpretation — best for novel questions</option>
        <option value="lookup">Match past examples only</option>
      </select>

      <div class="actions">
        <button type="button" class="primary" id="btnGenerate">Draft query</button>
        <button type="button" class="ghost" id="btnCopy" disabled>Copy</button>
        <button type="button" class="ghost" id="btnExecute" disabled>Run sample</button>
      </div>

      <div id="result"></div>
      <div id="executeResult"></div>
    </div>

    <footer>
      PhraseSQL produces draft queries for review. Always confirm output before use in production.
    </footer>
  </div>

  <script>
    function getApiBase() {
      const meta = document.querySelector('meta[name="phrasesql-api"]');
      const raw = (meta && meta.getAttribute('content') || '').trim().replace(/\/$/, '');
      const placeholder =
        !raw ||
        /your-phrasesql|YOUR_RENDER_SERVICE/i.test(raw);
      if (typeof location !== 'undefined' && location.protocol === 'file:') {
        return placeholder ? 'https://sqlclmcp-1.onrender.com' : raw;
      }
      if (!placeholder) return raw;
      return '';
    }

    const MCP_URL = getApiBase();

    const questionEl = document.getElementById('question');
    const modeEl = document.getElementById('mode');
    const btnGenerate = document.getElementById('btnGenerate');
    const btnCopy = document.getElementById('btnCopy');
    const btnExecute = document.getElementById('btnExecute');
    const resultEl = document.getElementById('result');
    const executeResultEl = document.getElementById('executeResult');
    const statusEl = document.getElementById('serverStatus');
    const statusRow = document.getElementById('serverStatusRow');

    let executeAvailable = false;

    function friendlyMode(mode) {
      const m = { hybrid: 'Balanced', llm: 'Full interpretation', lookup: 'Examples only' };
      return m[mode] || mode;
    }

    function formatRowCount(n) {
      if (n == null || n === '') return 'Results';
      const num = Number(n);
      if (num === 1) return '1 row';
      if (!isNaN(num)) return num + ' rows';
      return String(n);
    }

    function formatDisplayValue(v) {
      if (v === null || v === undefined) return '—';
      if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}T\d/.test(v)) {
        try {
          const d = new Date(v);
          if (!isNaN(d.getTime())) {
            return d.toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
          }
        } catch (_) { /* ignore */ }
      }
      return String(v);
    }

    function renderSchemaTips(tips) {
      const el = document.getElementById('schemaTips');
      if (!tips || !tips.length) {
        el.hidden = true;
        el.innerHTML = '';
        return;
      }
      el.hidden = false;
      el.innerHTML = tips.map(t => '<li>' + escapeHtml(t) + '</li>').join('');
    }

    async function checkHealth() {
      const base = MCP_URL;
      try {
        const r = await fetch(base + '/health');
        const data = await r.json();
        executeAvailable = !!data.execute_sql_available;
        const parts = [];
        if (data.status === 'ok') {
          parts.push('Connected');
          if (!executeAvailable) parts.push('running queries from this page is turned off');
        } else parts.push('Service status unclear');
        statusEl.innerHTML = parts.join(' — ');
        statusRow.className = 'panel status-line ' + (data.status === 'ok' ? 'ok' : 'fail');
        if (btnExecute) btnExecute.disabled = !executeAvailable ? true : !lastSql;
      } catch (e) {
        statusEl.textContent = 'We could not reach the service. If you just published this page, confirm it is connected to your backend.';
        statusRow.className = 'panel status-line fail';
        executeAvailable = false;
        if (btnExecute) btnExecute.disabled = true;
      }
    }

    checkHealth();

    let lastSql = '';
    let schemaData = null;

    async function loadSchema() {
      const fallback = {
        title: 'Reference tables',
        description:
          'These tables mirror a standard analytics warehouse shape. Use the exact names below when you ask questions—the app turns your wording into Oracle SQL using this layout.',
        tips: [
          'Identifiers must match this list exactly (same spelling and prefix: C_ for CUSTOMER, O_ for ORDERS, L_ for LINEITEM, P_ for PART, etc.).',
          'LINEITEM is one row per order line: join to ORDERS on L_ORDERKEY = O_ORDERKEY, to PART on L_PARTKEY = P_PARTKEY, to SUPPLIER on L_SUPPKEY = S_SUPPKEY.',
          'ORDERS holds order headers (customer, date, total); LINEITEM holds quantities, discounts, ship dates, and line revenue.',
          'PARTSUPP links each part to suppliers (PS_PARTKEY, PS_SUPPKEY) with availability and supply cost—use it for sourcing or cost questions.',
          'CUSTOMER.C_CUSTKEY joins to ORDERS.O_CUSTKEY; NATION.N_NATIONKEY links CUSTOMER, SUPPLIER, and REGION for geography.',
          'Money-like fields include O_TOTALPRICE, L_EXTENDEDPRICE, L_DISCOUNT, L_TAX, C_ACCTBAL, S_ACCTBAL, P_RETAILPRICE, PS_SUPPLYCOST.',
          'Dates on LINEITEM include L_SHIPDATE, L_COMMITDATE, L_RECEIPTDATE; order date is O_ORDERDATE on ORDERS.',
          'For aggregates (totals, counts, averages), prefer grouping by keys you join on so results stay one row per grain you care about.',
        ],
        tables: [
          { name: 'REGION', hint: 'Regions: R_REGIONKEY is the key. Join NATION.N_REGIONKEY here for country-to-region rollups.', columns: ['R_REGIONKEY', 'R_NAME', 'R_COMMENT'] },
          { name: 'NATION', hint: 'Countries: N_NATIONKEY primary key; N_REGIONKEY → REGION for continent/region.', columns: ['N_NATIONKEY', 'N_NAME', 'N_REGIONKEY', 'N_COMMENT'] },
          { name: 'CUSTOMER', hint: 'Customers: C_CUSTKEY joins ORDERS.O_CUSTKEY. C_NATIONKEY → NATION. C_ACCTBAL is account balance.', columns: ['C_CUSTKEY', 'C_NAME', 'C_ADDRESS', 'C_NATIONKEY', 'C_PHONE', 'C_ACCTBAL', 'C_MKTSEGMENT', 'C_COMMENT'] },
          { name: 'SUPPLIER', hint: 'Suppliers: S_SUPPKEY joins LINEITEM.L_SUPPKEY and PARTSUPP.PS_SUPPKEY. S_NATIONKEY → NATION.', columns: ['S_SUPPKEY', 'S_NAME', 'S_ADDRESS', 'S_NATIONKEY', 'S_PHONE', 'S_ACCTBAL', 'S_COMMENT'] },
          { name: 'PART', hint: 'Parts/products: P_PARTKEY joins LINEITEM.L_PARTKEY and PARTSUPP.PS_PARTKEY. P_RETAILPRICE is list price.', columns: ['P_PARTKEY', 'P_NAME', 'P_MFGR', 'P_BRAND', 'P_TYPE', 'P_SIZE', 'P_CONTAINER', 'P_RETAILPRICE', 'P_COMMENT'] },
          { name: 'ORDERS', hint: 'Order header: O_ORDERKEY is the key to LINEITEM. O_CUSTKEY → CUSTOMER. O_TOTALPRICE and O_ORDERDATE are common filters.', columns: ['O_ORDERKEY', 'O_CUSTKEY', 'O_ORDERSTATUS', 'O_TOTALPRICE', 'O_ORDERDATE', 'O_ORDERPRIORITY', 'O_CLERK', 'O_SHIPPRIORITY', 'O_COMMENT'] },
          { name: 'LINEITEM', hint: 'Line-level detail per order: L_LINENUMBER + L_ORDERKEY uniquely define a line. Revenue ≈ L_EXTENDEDPRICE × (1 − L_DISCOUNT) × (1 + L_TAX) (adjust per your conventions).', columns: ['L_ORDERKEY', 'L_PARTKEY', 'L_SUPPKEY', 'L_LINENUMBER', 'L_QUANTITY', 'L_EXTENDEDPRICE', 'L_DISCOUNT', 'L_TAX', 'L_RETURNFLAG', 'L_LINESTATUS', 'L_SHIPDATE', 'L_COMMITDATE', 'L_RECEIPTDATE', 'L_SHIPINSTRUCT', 'L_SHIPMODE', 'L_COMMENT'] },
          { name: 'PARTSUPP', hint: 'Bridge part ↔ supplier: composite key PS_PARTKEY + PS_SUPPKEY. PS_AVAILQTY and PS_SUPPLYCOST support inventory and costing questions.', columns: ['PS_PARTKEY', 'PS_SUPPKEY', 'PS_AVAILQTY', 'PS_SUPPLYCOST', 'PS_COMMENT'] },
        ],
      };
      try {
        const r = await fetch(MCP_URL + '/schema');
        schemaData = r.ok ? await r.json() : fallback;
      } catch (_) {
        schemaData = fallback;
      }
      if (schemaData && schemaData.tables) {
        document.getElementById('schemaToggleLabel').textContent = schemaData.title || 'Reference tables';
        document.getElementById('schemaDesc').textContent =
          schemaData.description || 'Open a table to see column names.';
        renderSchemaTips(schemaData.tips);
        const grid = document.getElementById('schemaGrid');
        grid.innerHTML = (schemaData.tables || []).map(t => {
          const cols = (t.columns || []).map(c =>
            '<span class="col-pill" data-col="' + escapeHtml(c) + '" title="Copy name">' + escapeHtml(c) + '</span>'
          ).join('');
          return '<div class="schema-card" data-table="' + escapeHtml(t.name) + '">' +
            (t.emoji ? '<div style="font-size:1.25rem;margin-bottom:0.2rem">' + escapeHtml(t.emoji) + '</div>' : '') +
            '<div class="schema-card-name">' + escapeHtml(t.name) + '</div>' +
            '<div class="schema-card-hint">' + escapeHtml(t.hint || '') + '</div>' +
            '<div class="schema-cols"><div class="schema-cols-title">Columns</div>' + cols + '</div></div>';
        }).join('');
      } else {
        schemaData = fallback;
        document.getElementById('schemaToggleLabel').textContent = 'Reference tables';
        document.getElementById('schemaDesc').textContent = 'Showing built-in reference tables.';
        renderSchemaTips(fallback.tips);
        const grid = document.getElementById('schemaGrid');
        grid.innerHTML = (fallback.tables || []).map(t => {
          const cols = (t.columns || []).map(c =>
            '<span class="col-pill" data-col="' + escapeHtml(c) + '" title="Copy name">' + escapeHtml(c) + '</span>'
          ).join('');
          return '<div class="schema-card" data-table="' + escapeHtml(t.name) + '">' +
            '<div class="schema-card-name">' + escapeHtml(t.name) + '</div>' +
            '<div class="schema-card-hint">' + escapeHtml(t.hint || '') + '</div>' +
            '<div class="schema-cols"><div class="schema-cols-title">Columns</div>' + cols + '</div></div>';
        }).join('');
      }
      document.getElementById('schemaSection').addEventListener('click', function schemaClick(e) {
        const card = e.target.closest('.schema-card');
        const pill = e.target.closest('.col-pill');
        if (card && !pill) {
          card.classList.toggle('open');
          document.getElementById('schemaSection').classList.add('open');
        }
        if (pill) {
          const col = pill.getAttribute('data-col');
          navigator.clipboard.writeText(col).then(() => {
            pill.classList.add('copied');
            pill.textContent = 'Copied';
            setTimeout(() => { pill.classList.remove('copied'); pill.textContent = col; }, 1200);
          });
        }
      });
    }
    loadSchema();

    document.getElementById('schemaToggle').addEventListener('click', () => {
      document.getElementById('schemaSection').classList.toggle('open');
      document.getElementById('schemaGrid').style.display =
        document.getElementById('schemaSection').classList.contains('open') ? 'grid' : 'none';
    });
    document.getElementById('schemaGrid').style.display = 'none';

    btnGenerate.addEventListener('click', async () => {
      const question = questionEl.value.trim();
      if (!question) {
        resultEl.innerHTML = '<div class="result error">Please enter a question.</div>';
        return;
      }
      btnGenerate.disabled = true;
      resultEl.innerHTML = '<div class="result">Drafting…</div>';
      try {
        const r = await fetch(MCP_URL + '/generate-sql', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question,
            mode: modeEl.value,
          }),
        });
        const data = await r.json();
        lastSql = data.generated_sql || '';
        if (data.success && data.generated_sql) {
          resultEl.innerHTML =
            '<div class="result success">' + escapeHtml(data.generated_sql) + '</div>' +
            '<p class="meta">Draft style: <strong>' + escapeHtml(friendlyMode(data.mode || modeEl.value)) + '</strong>.</p>';
          btnCopy.disabled = false;
          btnExecute.disabled = false;
          executeResultEl.innerHTML = '';
        } else {
          resultEl.innerHTML = '<div class="result error">' + escapeHtml(data.error || 'No query was produced. Try rephrasing your question.') + '</div>';
          btnCopy.disabled = true;
          btnExecute.disabled = true;
        }
      } catch (e) {
        resultEl.innerHTML = '<div class="result error">Something went wrong. Check your connection and try again.</div>';
        btnCopy.disabled = true;
        btnExecute.disabled = true;
      }
      btnGenerate.disabled = false;
    });

    btnCopy.addEventListener('click', () => {
      if (!lastSql) return;
      navigator.clipboard.writeText(lastSql).then(() => {
        btnCopy.textContent = 'Copied';
        setTimeout(() => { btnCopy.textContent = 'Copy'; }, 1500);
      });
    });

    btnExecute.addEventListener('click', async () => {
      if (!lastSql) return;
      executeResultEl.innerHTML = '<p class="meta">Running…</p>';
      btnExecute.disabled = true;
      try {
        const r = await fetch(MCP_URL + '/execute-sql', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sql: lastSql }),
        });
        const data = await r.json();
        if (data.success && data.rows) {
          const cols = data.columns || [];
          let table =
            '<p class="results-summary"><strong>' +
            escapeHtml(formatRowCount(data.rowCount)) +
            '</strong> · Swipe or scroll to see every column.</p>' +
            '<div class="table-wrap"><table><thead><tr>';
          cols.forEach(c => { table += '<th>' + escapeHtml(String(c)) + '</th>'; });
          table += '</tr></thead><tbody>';
          data.rows.forEach(row => {
            table += '<tr>';
            cols.forEach(col => {
              const v = row[col];
              table += '<td>' + escapeHtml(formatDisplayValue(v)) + '</td>';
            });
            table += '</tr>';
          });
          table += '</tbody></table></div>';
          executeResultEl.innerHTML = table;
        } else {
          const msg = data.error || 'Could not run the query.';
          executeResultEl.innerHTML = '<div class="result error">' + escapeHtml(msg) + '</div>' +
            (msg.indexOf('disabled') !== -1 ? '<p class="execute-hint">You can still copy the draft above and run it in your own environment.</p>' : '');
        }
      } catch (e) {
        executeResultEl.innerHTML = '<div class="result error">Something went wrong while running the query.</div>';
      }
      btnExecute.disabled = false;
    });

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
