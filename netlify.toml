# Netlify site: https://easynlsql.netlify.app
# Publishes app/ (index.html = full Easy NL2SQL UI).
# API calls use the same host; each path below is proxied to your Node backend (Render, etc.).
#
# IMPORTANT: Replace every occurrence of BACKEND below if your API is not on Render.
# BACKEND = https://sqlclmcp-1.onrender.com

[build]
  publish = "app"

# Proxy API → Node server (must match CORS / wallet / LLM config on that host)
[[redirects]]
  from = "/api-info"
  to = "https://sqlclmcp-1.onrender.com/api-info"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://sqlclmcp-1.onrender.com/health"
  status = 200
  force = true

[[redirects]]
  from = "/schema"
  to = "https://sqlclmcp-1.onrender.com/schema"
  status = 200
  force = true

[[redirects]]
  from = "/generate-sql"
  to = "https://sqlclmcp-1.onrender.com/generate-sql"
  status = 200
  force = true

[[redirects]]
  from = "/guided-expand-chapter"
  to = "https://sqlclmcp-1.onrender.com/guided-expand-chapter"
  status = 200
  force = true

[[redirects]]
  from = "/explain-sql"
  to = "https://sqlclmcp-1.onrender.com/explain-sql"
  status = 200
  force = true

[[redirects]]
  from = "/execute-sql"
