version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: oracle26ai
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-YourPassword123}
    ports:
      - "${DB_PORT:-1521}:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./scripts:/docker-entrypoint-initdb.d
    networks:
      - sqlcl-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sqlplus", "-s", "SYSTEM/YourPassword123@localhost:1521/FREE", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  oracle_data:
    driver: local

networks:
  sqlcl-network:
    driver: bridge
