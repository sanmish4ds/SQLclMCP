# Render: Docker MCP server (see ./Dockerfile).
#
# ── If logs show /home/render/python-env.sh (NOT "docker build") ─────────────
# Your SERVICE is still on the **Python native** runtime. Changing only this file
# does nothing until Render applies it. You CANNOT switch Python → Docker from the
# service Settings UI — see: https://render.com/docs/native-runtimes#changing-a-services-runtime
#
# Do ONE of:
#   1) Blueprint: Dashboard → Blueprints → this repo → **Sync** (or apply pending changes).
#   2) API: PATCH /v1/services/{id} with serviceDetails.runtime = "docker" + dockerDetails.
#   3) New Web Service → Environment **Docker**, connect same repo, Dockerfile path ./Dockerfile,
#      then delete the old Python service (fastest if Blueprint was never linked).
#
# Also ensure **Root Directory** is EMPTY (repo root). If it is `experiments`, the
# Dockerfile is invisible and Render may fall back to native Python.
#
# Python eval deps: experiments/eval-requirements.txt — never add requirements.txt at repo root.

services:
  - type: web
    name: sqlclmcp-server
    runtime: docker
    plan: free
    # Paths are relative to Root Directory (repository root when that field is empty).
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: ENABLE_LLM_SQL_GEN
        value: "true"
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: SQLCL_BIN
        value: /opt/sqlcl-bundle/sqlcl/bin/sql
      - key: JAVA_HOME
        value: /usr/lib/jvm/java-17-openjdk-amd64
      - key: TNS_ADMIN
        value: /app/wallet
      - key: ORACLE_WALLET_PATH
        value: /app/wallet
      # Set these in Render Dashboard → Environment (never commit real values):
      # - LLM_API_KEY
      # - LLM_API_URL (optional, default OpenAI)
      # - DB_DSN (e.g. prishivdb1_high), DB_USER, DB_PASSWORD
      # - DB_HOST, DB_PORT, DB_SID (optional, for /health display)
      # - ORACLE_WALLET_ZIP_B64 (base64 of your Autonomous DB wallet zip)
      # - SQLCL_KEEPALIVE_MS (optional, e.g. 240000 = ping DB every 4 min to avoid idle TCP/session drops)
