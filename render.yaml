# Render Blueprint: one web service for the MCP server
# Deploy: connect this repo in Render and use "Blueprint" or set the fields below manually.

services:
  - type: web
    name: sqlclmcp-server
    runtime: node
    plan: free

    buildCommand: >
      npm install &&
      curl -sL https://download.oracle.com/otn_software/java/sqldeveloper/sqlcl-latest.zip -o sqlcl.zip &&
      unzip -q sqlcl.zip -d . &&
      chmod +x sqlcl/bin/sql &&
      rm sqlcl.zip
    startCommand: npm start

    envVars:
      - key: ENABLE_LLM_SQL_GEN
        value: "true"
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: SQLCL_BIN
        value: ./sqlcl/bin/sql
      # Set these in Render Dashboard → Environment (never commit real values):
      # - LLM_API_KEY
      # - LLM_API_URL (optional, default OpenAI)
      # - DB_USER, DB_PASSWORD, DB_HOST, DB_PORT, DB_SID (optional, for /health display)
