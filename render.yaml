# Render Blueprint: MCP server as a Docker web service (see Dockerfile).
# Docker avoids native build scripts (python-env.sh / render-build-tool) if the dashboard
# was ever on Python or the Node native builder misbehaves.
# Python eval deps: experiments/requirements.txt (do not add root requirements.txt).

services:
  - type: web
    name: sqlclmcp-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: ENABLE_LLM_SQL_GEN
        value: "true"
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: SQLCL_BIN
        value: /opt/sqlcl-bundle/sqlcl/bin/sql
      - key: JAVA_HOME
        value: /usr/lib/jvm/java-17-openjdk-amd64
      - key: TNS_ADMIN
        value: /app/wallet
      - key: ORACLE_WALLET_PATH
        value: /app/wallet
      # Set these in Render Dashboard → Environment (never commit real values):
      # - LLM_API_KEY
      # - LLM_API_URL (optional, default OpenAI)
      # - DB_DSN (e.g. prishivdb1_high), DB_USER, DB_PASSWORD
      # - DB_HOST, DB_PORT, DB_SID (optional, for /health display)
      # - ORACLE_WALLET_ZIP_B64 (base64 of your Autonomous DB wallet zip)
      # - SQLCL_KEEPALIVE_MS (optional, e.g. 240000 = ping DB every 4 min to avoid idle TCP/session drops)
