# Render: PhraseSQL NL2SQL — Docker web service (./Dockerfile).
#
# IMPORTANT — this file is used only for Blueprint / IaC deploys. If you created the
# service with Dashboard → New → Web Service (not Blueprint), Render IGNORES render.yaml
# and uses whatever Environment you picked (Python → python-env.sh + render-build-tool).
#
# If logs show python-env.sh + render-build-tool: the service is still NATIVE Python,
# not Docker. Editing this repo cannot flip that runtime; see RENDER_FIX.txt.
#
# FASTEST fix (no Blueprint required):
#   Dashboard → New + → Web Service → repo → branch main
#   → Environment: **Docker** → Dockerfile Path: Dockerfile → Root Directory: (empty)
#   → copy env vars from broken service → Create. When healthy, delete OLD service and
#   point your *.onrender.com / custom domain at the new one. Update MCP_URL in app/ if URL changes.
#
# If you use Blueprints: Blueprints → sync this repo; runtime change must apply there
# (Dashboard cannot edit runtime on an existing service). See:
# https://render.com/docs/native-runtimes#changing-a-services-runtime
#
# Clone line "403": GitHub access (private repo). Account Settings → GitHub → reconnect
# or grant this repo to the Render app.
#
# Python eval deps: experiments/eval-requirements.txt — never commit requirements.txt at repo root.

services:
  - type: web
    name: phrasesql
    runtime: docker
    # GitHub repository URL (folder name may differ from product name PhraseSQL)
    repo: https://github.com/sanmish4ds/SQLclMCP
    plan: free
    branch: main
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: ENABLE_LLM_SQL_GEN
        value: "true"
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: TNS_ADMIN
        value: /app/wallet
      - key: ORACLE_WALLET_PATH
        value: /app/wallet
      # Set these in Render Dashboard → Environment (never commit real values):
      # - LLM_API_KEY
      # - LLM_API_URL (optional, default OpenAI)
      # - DB_DSN (e.g. prishivdb1_high), DB_USER, DB_PASSWORD
      # - DB_HOST, DB_PORT, DB_SID (optional, for /health display)
      # - ORACLE_WALLET_ZIP_B64 (base64 of your Autonomous DB wallet zip)
      # - APP_DISPLAY_NAME (optional UI/API label; default PhraseSQL)
